<section id="carrinho">

  <div class="container-carrinho">

      <h1>Meu Carrinho</h1>

      <table>
          <thead>
              <tr>
                  <th>Produto</th>
                  <th>Preço</th>
                  <th>Quantidade</th>
                  <th>Total</th>
                  <th></th>
              </tr>
          </thead>

          <tbody id="listaCarrinho">
          </tbody>
      </table>

      <p id="carrinhoVazio" class="carrinho-vazio" style="display:none;">
          Seu carrinho está vazio.
          <a href="../index.html">Voltar para a loja</a>
          <link rel="stylesheet" href="../css/style_carrinho.css">
 
<script src="../script_loja.js"></script>
      </p>

      <!-- Cálculo do CEP -->
      <div class="cep-box">

          <h3>Calcular Frete</h3>

          <div class="cep-form">

              <label for="cep">CEP</label>

              <input
                  type="text"
                  id="cep"
                  placeholder="00000-000"
                  maxlength="9">

              <button id="btnCep">
                  Calcular
              </button>

          </div>

          <p id="resultadoCep"></p>

      </div>

      <!-- Resumo -->
      <div class="resumo">

          <p>Subtotal:
              <span id="subtotal">R$ 0,00</span>
          </p>

          <p>Frete:
              <span id="frete">R$ 0,00</span>
          </p>

          <h2>Total:
              <span id="total">R$ 0,00</span>
          </h2>

          <button class="finalizar">
              Finalizar Compra
          </button>

      </div>

  </div>

</section>
