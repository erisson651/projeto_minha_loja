<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APEX SPORT</title>

  <link rel="stylesheet" href="../css/style_sobre.css">
</head>

<body>
  <main id="geral">
    <header id="cabecalho">
      <div id="divlogo">
        APEX SPORT
      </div>

      <nav id="menu">
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="sobre.html">Sobre</a></li>
          <li><a href="login.html">Login</a></li> 
          
          
        </ul>
      </nav>

    </header>
    

    <section id="form">

      <h3>Cadastro</h3>

      <form id="form-cadastro">

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" class="input001" required maxlength="20">
    
        <label for="sobrenome">Sobrenome</label>
        <input type="text" id="sobrenome" name="sobrenome" class="input001" required maxlength="60">
    
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" class="input001"
            maxlength="14" placeholder="000.000.000-00" required>
    
        <label for="data-nascimento">Data de nascimento</label>
        <input type="date" id="data-nascimento" name="data-nascimento"
            class="input001" required>
    
        <label for="cep">CEP</label>
        <input type="text" id="cep" name="cep" class="input002"
            maxlength="8" inputmode="numeric" required>
    
        <label for="tipo-logradouro">Tipo de endereço</label>
        <select id="tipo-logradouro" name="tipo-logradouro" class="input001" required>
            <option value="">Selecione...</option>
            <option value="Rua">Rua</option>
            <option value="Avenida">Avenida</option>
            <option value="Travessa">Travessa</option>
            <option value="Alameda">Alameda</option>
            <option value="Praça">Praça</option>
            <option value="Rodovia">Rodovia</option>
            <option value="Estrada">Estrada</option>
            <option value="Vila">Vila</option>
        </select>
    
        <label for="logradouro">Logradouro</label>
        <input type="text" id="logradouro" name="logradouro"
            class="input002" maxlength="100" required>
    
        <label for="numero">Número</label>
        <input type="text" id="numero" name="numero"
            class="input001" maxlength="10" required>
    
        <label for="cintura">Tamanho da cintura</label>
        <select id="cintura" name="cintura" class="input001" required>
            <option value="">Selecione...</option>
            <option>34</option>
            <option>36</option>
            <option>38</option>
            <option>40</option>
            <option>42</option>
            <option>44</option>
            <option>46</option>
            <option>48</option>
            <option>50</option>
            <option>52</option>
            <option>54</option>
            <option>56</option>
            <option>58</option>
            <option>60</option>
        </select>
    
        <label for="tenis">Número do tênis</label>
        <select id="tenis" name="tenis" class="input001" required>
            <option value="">Selecione...</option>
            <option>33</option>
            <option>34</option>
            <option>35</option>
            <option>36</option>
            <option>37</option>
            <option>38</option>
            <option>39</option>
            <option>40</option>
            <option>41</option>
            <option>42</option>
            <option>43</option>
            <option>44</option>
            <option>45</option>
            <option>46</option>
            <option>47</option>
            <option>48</option>
        </select>

        <label for="tenis">Tamanho Medidas</label>
        <select id="tenis" name="tenis" class="input001" required>
            <option value="">Selecione...</option>
            <option>P</option>
            <option>M</option>
            <option>G</option>
            <option>GG</option>
            
        </select>
    
        <div class="checkbox-group">
            <label>
                <input type="checkbox" id="ofertas" name="ofertas">
                Desejo receber ofertas por e-mail e WhatsApp.
            </label>
        </div>
    
        <div class="checkbox-group">
            <label>
                <input type="checkbox" id="termos" name="termos" required>
                Concordo com os<a href="../termos da loja.html"> Termos de Uso e a Política de Privacidade.</a>
            </label>
           
        </div>
    
        <button type="submit">Cadastrar</button>
        <li>termos e condições</li>
    
    </form>
      


                  </section>


                  <footer id="rodape">
                    <h2>&copy 2026 Nexus Wear S.A todos os direitos reservados</h2>
                    <p>Formas de pagamento:Pix, Cartões de Débito e Crédito</p>
                  </footer>
  </main>

</body>

</html>
